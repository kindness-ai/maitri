# Menus
bindd = SUPER, SPACE, Launch apps, exec, maitri-launch-walker
bindd = SUPER CTRL, E, Emoji picker, exec, maitri-launch-walker -m symbols
bindd = SUPER CTRL, C, Capture menu, exec, maitri-menu capture
bindd = SUPER CTRL, O, Toggle menu, exec, maitri-menu toggle
bindd = SUPER CTRL, H, Hardware menu, exec, maitri-menu hardware
bindd = SUPER ALT, SPACE, maitri menu, exec, maitri-menu
bindd = SUPER SHIFT, code:201, maitri menu, exec, maitri-menu
bindd = SUPER, ESCAPE, System menu, exec, maitri-menu system
bindld = , XF86PowerOff, Power menu, exec, maitri-menu system
bindd = SUPER, K, Show key bindings, exec, maitri-menu-keybindings
bindd = , XF86Calculator, Calculator, exec, gnome-calculator

# Aesthetics
bindd = SUPER SHIFT, SPACE, Toggle top bar, exec, maitri-toggle-waybar
bindd = SUPER CTRL, SPACE, Theme background menu, exec, maitri-menu background
bindd = SUPER SHIFT CTRL, SPACE, Theme menu, exec, maitri-menu theme
bindd = SUPER, BACKSPACE, Toggle window transparency, exec, maitri-hyprland-window-transparency-toggle
bindd = SUPER SHIFT, BACKSPACE, Toggle window gaps, exec, maitri-hyprland-window-gaps-toggle
bindd = SUPER CTRL, BACKSPACE, Toggle single-window square aspect, exec, maitri-hyprland-window-single-square-aspect-toggle

# Notifications
bindd = SUPER, COMMA, Dismiss last notification, exec, makoctl dismiss
bindd = SUPER SHIFT, COMMA, Dismiss all notifications, exec, makoctl dismiss --all
bindd = SUPER CTRL, COMMA, Toggle silencing notifications, exec, maitri-toggle-notification-silencing
bindd = SUPER ALT, COMMA, Invoke last notification, exec, makoctl invoke
bindd = SUPER SHIFT ALT, COMMA, Restore last notification, exec, makoctl restore

# Toggles
bindd = SUPER CTRL, I, Toggle locking on idle, exec, maitri-toggle-idle
bindd = SUPER CTRL, N, Toggle nightlight, exec, maitri-toggle-nightlight
bindd = SUPER CTRL, Delete, Toggle laptop display, exec, maitri-hyprland-monitor-internal toggle
bindd = SUPER CTRL ALT, Delete, Toggle laptop display mirroring, exec, maitri-hyprland-monitor-internal-mirror toggle
bindl = , switch:on:Lid Switch, exec, maitri-hw-external-monitors && maitri-hyprland-monitor-internal off
bindl = , switch:off:Lid Switch, exec, maitri-hyprland-monitor-internal on

# Captures
bindd = , PRINT, Screenshot, exec, maitri-capture-screenshot
bindd = ALT, PRINT, Screenrecording, exec, maitri-menu screenrecord
bindd = SUPER, PRINT, Color picker, exec, pkill hyprpicker || hyprpicker -a
bindd = SUPER CTRL, PRINT, Extract text (OCR) from screenshot, exec, maitri-capture-text-extraction

# File sharing
bindd = SUPER CTRL, S, Share, exec, maitri-menu share

# Transcoding
bindd = SUPER CTRL, PERIOD, Transcode, exec, maitri-transcode

# Reminders
bindd = SUPER CTRL, R, Set reminder, exec, maitri-menu reminder-set
bindd = SUPER CTRL ALT, R, Show reminders, exec, maitri-reminder show
bindd = SUPER SHIFT CTRL, R, Clear reminders, exec, maitri-reminder clear

# Waybar-less information
bindd = SUPER CTRL ALT, T, Show time, exec, notify-send -u low "    $(date +"%A %H:%M  ·  %d %B %Y  ·  Week %V")"
bindd = SUPER CTRL ALT, B, Show battery remaining, exec, notify-send -u low "$(maitri-battery-status)"
bindd = SUPER CTRL ALT, W, Show weather, exec, notify-send -u low "$(maitri-weather-status)"

# Control panels
bindd = SUPER CTRL, A, Audio controls, exec, maitri-launch-audio
bindd = SUPER CTRL, B, Bluetooth controls, exec, maitri-launch-bluetooth
bindd = SUPER CTRL, W, Wifi controls, exec, maitri-launch-wifi
bindd = SUPER CTRL, T, Activity, exec, maitri-launch-tui btop

# Dictation
bindd = SUPER CTRL, X, Toggle dictation, exec, voxtype record toggle

bindd  = , F9, Start dictation (push-to-talk), exec, voxtype record start
binddr = , F9, Stop dictation (push-to-talk),  exec, voxtype record stop

# Zoom
bindd = SUPER CTRL, Z, Zoom in, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float + 1')
bindd = SUPER CTRL ALT, Z, Reset zoom, exec, hyprctl keyword cursor:zoom_factor 1

# Lock system
bindd = SUPER CTRL, L, Lock system, exec, maitri-system-lock
