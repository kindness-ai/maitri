name: Build maitri ISO

# Builds the installer ISO when a GitHub Release is published, and attaches the
# ISO to that release. The workflow_dispatch button is kept for test builds only
# (those upload the ISO as an artifact, not as a release asset).
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build from (test builds)"
        default: main
      mirror:
        description: "Package channel"
        default: stable
        type: choice
        options: [stable, rc, edge]

permissions:
  contents: write # needed to attach the ISO to the release

concurrency:
  group: build-iso-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Resolve build ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "ref=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.inputs.ref || 'main' }}" >> "$GITHUB_OUTPUT"
          fi

      # archiso + an offline package mirror need a lot of disk; reclaim ~30GB.
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          large-packages: true
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Build ISO (archiso inside an Arch container)
        env:
          MAITRI_INSTALLER_REPO: ${{ github.repository }}
          MAITRI_INSTALLER_REF: ${{ steps.ref.outputs.ref }}
          MAITRI_MIRROR: ${{ github.event.inputs.mirror || 'stable' }}
        run: |
          mkdir -p release
          docker run --rm --privileged \
            -e MAITRI_INSTALLER_REPO="$MAITRI_INSTALLER_REPO" \
            -e MAITRI_INSTALLER_REF="$MAITRI_INSTALLER_REF" \
            -e MAITRI_MIRROR="$MAITRI_MIRROR" \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -v "$PWD/iso/configs:/configs:ro" \
            -v "$PWD/iso/builder:/builder:ro" \
            -v "$PWD/release:/out" \
            archlinux/archlinux:latest \
            /builder/build-iso.sh

      - name: Name the ISO
        id: iso
        run: |
          built="$(ls -t release/*.iso | head -n1)"
          ref="${{ steps.ref.outputs.ref }}"
          name="maitri-${ref//\//-}.iso"
          mv -f "$built" "release/$name"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          ls -lh release/

      # The offline ISO is ~7 GB — too big for a GitHub release asset (2 GiB cap),
      # so we publish it to Docker Hub as an OCI artifact (via ORAS) and link it
      # from the release notes.
      - name: Set up ORAS
        if: github.event_name == 'release'
        uses: oras-project/setup-oras@v1

      - name: Publish ISO to Docker Hub & link from the release
        if: github.event_name == 'release'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          name="${{ steps.iso.outputs.name }}"
          iso="release/$name"
          tag="${{ steps.ref.outputs.ref }}"; tag="${tag//\//-}"
          ns="${DOCKERHUB_NAMESPACE:-$DOCKERHUB_USERNAME}"
          repo="docker.io/$ns/maitri-iso"

          sha=$(sha256sum "$iso" | awk '{print $1}')

          echo "$DOCKERHUB_TOKEN" | oras login docker.io -u "$DOCKERHUB_USERNAME" --password-stdin
          ( cd release && oras push "$repo:$tag" \
              --artifact-type application/vnd.maitri.iso \
              --annotation "org.opencontainers.image.title=$name" \
              --annotation "io.maitri.iso.sha256=$sha" \
              "$name:application/octet-stream" )
          oras tag "$repo:$tag" latest

          # Append a Download section to the auto-generated release notes.
          body=$(gh release view "${{ github.event.release.tag_name }}" -R "${{ github.repository }}" --json body -q .body)
          {
            printf '%s\n\n---\n\n' "$body"
            printf '## 📀 Download\n\n'
            printf 'The installer ISO (~7 GB, offline-capable) is published as an OCI artifact on Docker Hub.\n'
            printf 'Pull it with [ORAS](https://oras.land):\n\n'
            printf '```sh\noras pull %s:%s\n```\n\n' "$repo" "$tag"
            printf '`sha256: %s`\n' "$sha"
          } > release-notes.md
          gh release edit "${{ github.event.release.tag_name }}" -R "${{ github.repository }}" --notes-file release-notes.md

      - name: Upload ISO artifact (backup / test builds)
        uses: actions/upload-artifact@v5
        with:
          name: maitri-iso-${{ github.run_number }}
          path: release/*.iso
          retention-days: 7
          # ISO is already compressed (squashfs/xz); don't re-zip.
          compression-level: 0
